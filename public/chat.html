<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aaj Kya Khaun</title>
  <meta name="theme-color" content="#001858" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="AKK" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg" />
  <link rel="apple-touch-icon" href="/static/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/app.css" />
  <link rel="stylesheet" href="/static/chat.css" />
</head>
<body class="chat-body">
  <header class="chat-header">
    <a href="/" class="logo-mini">🍽️ Aaj Kya Khaun</a>
    <div class="chat-header-actions">
      <a href="/settings" class="link-muted">Settings</a>
    </div>
  </header>

  <main class="chat-main">
    <section class="chat-empty" id="chat-empty" hidden>
      <div class="emoji-stack">🍽️</div>
      <h1 id="chat-empty-title">What should we cook?</h1>
      <p class="lede">Try one of these or type anything:</p>
      <div class="suggest-row">
        <button class="chip suggest" data-prefill="i'm hungry, what can i make?">i'm hungry</button>
        <button class="chip suggest" data-prefill="order milk and 6 eggs">order milk and 6 eggs</button>
        <button class="chip suggest" data-prefill="what's in my kitchen?">what's in my kitchen?</button>
      </div>
    </section>

    <ol class="chat-thread" id="chat-thread"></ol>

    <div class="chat-typing" id="chat-typing" hidden>
      <span></span><span></span><span></span>
    </div>
  </main>

  <form class="chat-composer" id="chat-form" autocomplete="off">
    <textarea
      id="chat-input"
      class="chat-input"
      rows="1"
      maxlength="4000"
      placeholder="Tell me what you're hungry for…"
      aria-label="Message"
    ></textarea>
    <button type="submit" id="chat-send" class="btn-send" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <path d="M5 12h14M13 5l7 7-7 7" />
      </svg>
    </button>
  </form>

  <script src="/static/chat.js"></script>
</body>
</html>
