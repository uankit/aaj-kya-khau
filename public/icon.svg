<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Aaj Kya Khaun">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF6E4"/>
      <stop offset="100%" stop-color="#F3D2C1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- soft accent blobs that match landing palette -->
  <circle cx="120" cy="100" r="120" fill="#F582AE" opacity="0.18"/>
  <circle cx="430" cy="430" r="140" fill="#A7C957" opacity="0.20"/>
  <!-- emoji-style plate, but drawn so it looks consistent across platforms -->
  <g transform="translate(256 268)">
    <!-- plate -->
    <ellipse cx="0" cy="40" rx="148" ry="32" fill="#001858" opacity="0.08"/>
    <circle r="124" fill="#FFFBF0" stroke="#001858" stroke-width="6"/>
    <circle r="92"  fill="none"     stroke="#001858" stroke-width="3" opacity="0.35"/>
    <!-- food blobs -->
    <circle cx="-32" cy="-18" r="32" fill="#F582AE"/>
    <circle cx="36"  cy="-6"  r="26" fill="#F59E0B"/>
    <circle cx="0"   cy="36"  r="22" fill="#A7C957"/>
  </g>
  <!-- wordmark dot -->
  <circle cx="408" cy="104" r="14" fill="#001858"/>
</svg>
